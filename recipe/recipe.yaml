schema_version: 1

context:
  version: "3.4.0"

package:
  name: guard-core
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/g/guard-core/guard_core-${{ version }}.tar.gz
  sha256: 11fda317276881f1f9ff9753bb9dcd78a47633f493a465c0fec4e1dfd5be29a6

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - pip
  run:
    - python >=${{ python_min }}
    - aiohttp
    - cachetools
    - maxminddb
    - pydantic
    - redis-py
    - requests
    - typing_extensions

tests:
  - python:
      imports:
        - guard_core
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Framework-agnostic security engine for the Guard ecosystem.
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/rennf93/guard-core

extra:
  recipe-maintainers:
    - thewchan
